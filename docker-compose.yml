services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      - nginx_logs:/var/log/nginx:ro
    networks:
      - hng-network
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=44.214.252.145

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - hng-network
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    container_name: detector
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - nginx_logs:/var/log/nginx:ro
    networks:
      - hng-network
    cap_add:
      - NET_ADMIN
    privileged: true
    depends_on:
      - nginx

volumes:
  nextcloud_data:
  nginx_logs:
    name: HNG-nginx-logs

networks:
  hng-network:
    driver: bridge
